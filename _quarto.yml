project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "projects/**/*.qmd"
    - "pilot/**/*.qmd"
    - "practice/**/*.qmd"

website:
  title: "Developers Academy Platform"
  site-url: "https://earthrise-developers-academy-lab.github.io/developers-academy-github-guide/"
  repo-url: "https://github.com/earthrise-developers-academy-lab/developers-academy-github-guide"
  repo-actions:
    - source
    - issue
  repo-link-target: _blank

  navbar:
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Start here"
        href: start-here.qmd
      - text: "Contribute"
        menu:
          - text: "First pull request"
            href: first-pull-request.qmd
          - text: "Troubleshoot with Copilot"
            href: copilot-troubleshooting.qmd
          - text: "Onboarding pilot"
            href: pilot/index.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Leadership review"
        href: projects/da-eo-001/deliverables/priority-locations-decision-brief.qmd
      - text: "Repository stewards"
        href: stewards.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true

execute:
  freeze: auto
