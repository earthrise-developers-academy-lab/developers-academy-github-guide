site_name: Developers Academy GitHub Guide
site_description: Issue-first onboarding and project workflow guidance for Developers Academy participants.
site_url: https://earthrise-developers-academy-lab.github.io/developers-academy-github-guide/
repo_url: https://github.com/earthrise-developers-academy-lab/developers-academy-github-guide
repo_name: earthrise-developers-academy-lab/developers-academy-github-guide
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Start here: start-here.md
  - Track project work:
      - Issues and deliverables: issues-and-deliverables.md
      - Progress and Google Docs: progress-and-google-docs.md
  - Contribute:
      - First GitHub Desktop pull request: first-github-desktop-pr.md
      - Participant practice: participants/index.md
  - Troubleshoot:
      - Copilot troubleshooting: copilot-troubleshooting.md
      - Getting help: getting-help.md
